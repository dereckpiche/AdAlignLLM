experiment:
  wandb_enabled: true
  nb_epochs: 500
  nb_matches_per_iteration: 64
  reinit_matches_each_it: true
  checkpoint_every_n_iterations: 5
  start_epoch: 0
  resume_experiment: true
  base_seed: 0
  seed_group_size: 8
  train: true
  stat_methods_for_live_wandb: mllm.markov_games.negotiation.negotiation_statistics
  name: tas_rps_naive_vs_open_ai_nov
  agent_buffer: false
  keep_agent_buffer_count: ${lora_count}
  agent_buffer_recent_k: -1
  description: Trust-and-Split Rock Paper Scissors negotiation game
logging:
  wandb:
    enabled: false
    project: llm-negotiation
    entity: null
    mode: online
    name: null
    group: null
    tags: []
    notes: null
temperature: 1.0
markov_games:
  runner_method_name: LinearRunner
  runner_kwargs: {}
  group_by_round: true
  simulation_class_name: TrustAndSplitRPSSimulation
  simulation_init_args:
    nb_of_rounds: 10
    quota_messages_per_agent_per_round: 1
    alternating_hands: false
  agents:
    0:
      agent_id: ${agent_0_id}
      agent_name: Alice
      agent_class_name: TrustAndSplitRPSAgent
      policy_id: base_llm/agent_adapter
      init_kwargs:
        goal: Maximize your total points over the whole game.
        num_message_chars: 500
        message_start_end_format: true
        proposal_start_end_format: true
    1:
      agent_id: ${agent_1_id}
      agent_name: Bob
      agent_class_name: TrustAndSplitRPSAgent
      policy_id: openai_llm
      init_kwargs:
        goal: Maximize your total points over the whole game.
        num_message_chars: 500
        message_start_end_format: true
        proposal_start_end_format: true
models:
  base_llm:
    class: LeanLocalLLM
    init_args:
      llm_id: base_llm
      model_name: Qwen/Qwen2.5-7B-Instruct
      inference_backend: vllm
      hf_kwargs:
        device_map: auto
        torch_dtype: bfloat16
        max_memory:
          0: 20GiB
        attn_implementation: flash_attention_2
      inference_backend_init_kwargs:
        enable_lora: true
        seed: ${experiment.base_seed}
        enable_prefix_caching: true
        max_model_len: 10000.0
        gpu_memory_utilization: 0.5
        dtype: bfloat16
        trust_remote_code: true
        max_lora_rank: 32
        enforce_eager: false
        max_loras: ${lora_count}
        max_cpu_loras: ${lora_count}
        enable_sleep_mode: true
      inference_backend_sampling_params:
        temperature: ${temperature}
        top_p: 1.0
        max_tokens: 400
        top_k: -1
        logprobs: 0
      adapter_configs:
        agent_adapter:
          task_type: CAUSAL_LM
          r: 32
          lora_alpha: 64
          lora_dropout: 0.0
          target_modules: all-linear
        critic_adapter:
          task_type: CAUSAL_LM
          r: 32
          lora_alpha: 64
          lora_dropout: 0.0
          target_modules: all-linear
      enable_thinking: null
      regex_max_attempts: 1
  openai_llm:
    class: LargeLanguageModelOpenAI
    init_args:
      llm_id: openai_llm
      model: gpt-5-nano
      base_url: https://api.openai.com/v1
      timeout_s: 6000.0
      regex_max_attempts: 3
      sampling_params:
        temperature: 1.0
        top_p: 1.0
critics:
  agent_critic:
    module_pointer:
    - base_llm
    - critic_adapter
optimizers:
  agent_optimizer:
    module_pointer:
    - base_llm
    - agent_adapter
    optimizer_class_name: torch.optim.Adam
    init_args:
      lr: 3.0e-06
      weight_decay: 0.0
  critic_optimizer:
    module_pointer: agent_critic
    optimizer_class_name: torch.optim.Adam
    init_args:
      lr: 3.0e-06
      weight_decay: 0.0
trainers:
  agent_trainer:
    class: TrainerNaive
    module_pointers:
      policy:
      - base_llm
      - agent_adapter
      policy_optimizer: agent_optimizer
      critic: agent_critic
      critic_optimizer: critic_optimizer
    kwargs:
      entropy_coeff: 0.0
      entropy_topk: null
      entropy_mask_regex: null
      kl_coeff: 0.001
      gradient_clipping: 1.0
      restrict_tokens: null
      mini_batch_size: 1
      use_gradient_checkpointing: true
      temperature: ${temperature}
      device: cuda:0
      use_gae: false
      whiten_advantages: false
      whiten_advantages_time_step_wise: false
      skip_discounted_state_visitation: true
      use_gae_lambda_annealing: false
      gae_lambda_annealing_method: None
      gae_lambda_annealing_method_params: None
      gae_lambda_annealing_limit: 0.95
      discount_factor: 0.96
      use_rloo: true
      enable_tokenwise_logging: false
      pg_loss_normalization: nb_tokens
      truncated_importance_sampling_ratio_cap: 2.0
      reward_normalizing_constant: 100.0
train_on_which_data:
  agent_trainer:
  - Alice
lora_count: 30
common_agent_kwargs:
  goal: Maximize your total points over the whole game.
  num_message_chars: 500
  message_start_end_format: true
  proposal_start_end_format: true
agent_0_id: Alice
agent_1_id: Bob
agent_ids:
- Alice
- Bob
