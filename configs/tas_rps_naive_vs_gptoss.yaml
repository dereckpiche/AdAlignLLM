defaults:
    - tas_rps_naive.yaml

experiment:
    name: "tas_rps_naive_vs_gptoss_120b_low"
    nb_epochs: 500
    nb_matches_per_iteration: 64
    wandb_enabled: true
    seed_group_size: 8
    train: true
    use_buffer: false
    
agent_0_id: Alice
agent_1_id: Bob
agent_ids: ["Alice", "Bob"]

markov_games:
    agents:
        0:
            agent_name: Alice
            policy_id: base_llm/agent_adapter
        1:
            agent_name: Bob
            policy_id: openai_llm

temperature: 1.0

optimizers:
    critic_optimizer: null
    agent_optimizer:
        module_pointer: ["base_llm", "agent_adapter"]
        optimizer_class_name: torch.optim.Adam
        init_args:
            lr: 3e-6
            weight_decay: 0.0

models:
    openai_llm:
        class: LargeLanguageModelOpenAI
        init_args:
            llm_id: openai_llm
            model:  openai/gpt-oss-120b # https://platform.openai.com/docs/pricing
            base_url: http://127.0.0.1:${oc.env:VLLM_PORT}/v1
            timeout_s: 6000.0
            regex_max_attempts: 3
            add_constraint_msg: false
            sampling_params:
                temperature: 1.0
                top_p: 1.0
    base_llm:
        init_args:
            regex_max_attempts: 3
            inference_backend_init_kwargs:
                enable_prefix_caching: False
                enforce_eager: false

train_on_which_data:
    agent_trainer: ["Alice"]