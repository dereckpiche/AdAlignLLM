defaults:
    - tas_rps_naive.yaml

experiment:
    name: "tas_rps_naive_vs_open_ai"
    nb_epochs: 500
    nb_matches_per_iteration: 64
    seed_group_size: 4
    train: true
    use_buffer: false
agent_0_id: Alice
agent_1_id: Bob
agent_ids: ["Alice", "Bob"]

markov_games:
    max_games: 20
    continuation_probability: 0.85
    agents:
        0:
            agent_name: Alice
            policy_id: base_llm/agent_adapter
        1:
            agent_name: Bob
            policy_id: openai_llm

temperature: 1.0

optimizers:
    critic_optimizer: null
    agent_optimizer:
        module_pointer: ["base_llm", "agent_adapter"]
        optimizer_class_name: torch.optim.Adam
        init_args:
            lr: 1e-5
            weight_decay: 0.0

models:
    base_llm:
        init_args:
            regex_max_attempts: -1
            model_name: Qwen/Qwen2.5-7B-Instruct
            enable_thinking: null
            inference_backend_sampling_params:
                max_tokens: 120

    openai_llm:
        class: LargeLanguageModelOpenAI
        init_args:
            llm_id: openai_llm
            model: gpt-5-nano # https://platform.openai.com/docs/pricing
            base_url: https://api.openai.com/v1
            timeout_s: 6000.0
            regex_max_attempts: 3
            sampling_params:
                temperature: 1.0
                top_p: 1.0

trainers:
    agent_trainer:
        kwargs:
            kl_coeff: 0.0
            discount_factor: 1.0
            mini_batch_size: 1
            use_gradient_checkpointing: True

train_on_which_data:
    agent_trainer: ["Alice"]
