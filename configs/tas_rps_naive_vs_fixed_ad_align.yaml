defaults:
    - tas_rps_naive.yaml

experiment:
    name: "tas_rps_naive_vs_fixed_ad_align"
    nb_matches_per_iteration: 64
    seed_group_size: 8
    train: true
    use_buffer: false

hf_checkpoints_root: ${oc.env:SCRATCH}/llm_negotiation/HF_checkpoints
fixed_ad_align_adapter_path: ${hf_checkpoints_root}/tas_rps_vanilla_ad_align_seed1337/seed_1337/Qwen/Qwen2.5-7B-Instruct/adapters/agent_adapter

agent_0_id: Alice
agent_1_id: Bob
agent_ids: ["Alice", "Bob"]

markov_games:
    agents:
        0:
            agent_name: Alice
            policy_id: base_llm/agent_adapter
        1:
            agent_name: Bob
            policy_id: base_llm/fixed_ad_align_adapter

temperature: 1.0

optimizers:
    critic_optimizer: null
    agent_optimizer:
        module_pointer: ["base_llm", "agent_adapter"]
        optimizer_class_name: torch.optim.Adam
        init_args:
            lr: 3e-6
            weight_decay: 0.0

models:
    base_llm:
        init_args:
            regex_max_attempts: -1
            initial_adapter_paths:
                fixed_ad_align_adapter: ${fixed_ad_align_adapter_path}
            adapter_configs:
                fixed_ad_align_adapter:
                    task_type: CAUSAL_LM
                    r: 32
                    lora_alpha: 64
                    lora_dropout: 0.0
                    target_modules: all-linear

train_on_which_data:
    agent_trainer: ["Alice"]
